<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">  
</head>
<body>
    <h1>JokeBook</h1>
    <div id="random-joke-container"></div>
    <button id="categories-button">View Joke Categories</button>
    <div id="categories-header"></div>
    <div id="categories-container"></div>
    <div id="jokes-container"></div>

    <h2>Create A Joke:</h2>
    <form action="">
        <label for="joke-category">Enter Joke Category:</label>
        <input type="text" name="joke-category" id="joke-category">
        <label for="joke-setup">Enter Joke Setup:</label>
        <input type="text" name="joke-setup" id="joke-setup">
        <label for="joke-delivery">Enter Joke Delivery:</label>
        <input type="text" name="joke-delivery" id="joke-delivery">
        <input type="button" value="Add Joke" id="joke-submit">
    </form>
</body>
</html>
